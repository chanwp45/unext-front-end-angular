services:

  # ── Development — Angular CLI dev server with hot-reload ────────────────────
  app-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --poll 1000"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    profiles: [dev]

  # ── Production — nginx serving the built Angular app ───────────────────────
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    profiles: [prod]
