<mat-sidenav-container class="shell-container">

  <mat-sidenav
    #sidenav
    [mode]="sidenavMode"
    [opened]="sidenavOpened"
    class="sidenav"
  >
    <div class="sidenav-header">
      <div class="logo-wrap">
        <mat-icon>school</mat-icon>
      </div>
      <div class="logo-text-wrap">
        <span class="logo-text">U-Next</span>
        <span class="logo-sub">University System</span>
      </div>
      <!-- Close button — mobile only -->
      @if (isMobile) {
        <button mat-icon-button class="sidenav-close-btn" (click)="sidenav.close()">
          <mat-icon>close</mat-icon>
        </button>
      }
    </div>

    <div class="nav-section-label">เมนูหลัก</div>

    <mat-nav-list class="nav-list">
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active-nav-item"
          (click)="onNavClick()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">© 2026 U-Next v1.0</div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="toolbar">
      <!-- Hamburger — mobile only -->
      @if (isMobile) {
        <button mat-icon-button class="menu-btn" (click)="toggleSidenav()">
          <mat-icon>menu</mat-icon>
        </button>
      }

      <span class="toolbar-title">ระบบจัดการมหาวิทยาลัย</span>
      <span class="toolbar-spacer"></span>

      <div class="toolbar-actions">
        <button mat-icon-button class="logout-btn" matTooltip="ออกจากระบบ" (click)="logout()">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </mat-toolbar>

    <main class="main-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
